id: openmeteo-gold
name: Open-Meteo Gold ETL
description: Aggregate silver Open-Meteo data into gold analytics Delta table
archetype: gold-etl
traits:
  - type: upstream-dependency
    evaluator: evaluate/upstream-dependency
    config:
      tableName: "${TABLE_NAME}"
      upstreamPipeline: "openmeteo-silver"
  - type: record-count
    evaluator: evaluate/record-count
    config:
      bucket: "${BUCKET_NAME}"
      prefix: "silver/openmeteo/"
      minObjects: 1
      dateOnly: true
trigger:
  type: glue
  jobName: medallion-gold-openmeteo
  arguments:
    "--source": "openmeteo"
    "--tier": "gold"
    "--date": "${date}"
    "--hour": "${hour}"
sla:
  evaluationDeadline: "+40m"
  timezone: "UTC"
