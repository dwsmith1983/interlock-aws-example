id: openmeteo-silver
name: Open-Meteo Silver ETL
description: Transform raw Open-Meteo weather data from bronze JSONL to silver Delta table
archetype: silver-etl
traits:
  - type: source-freshness
    evaluator: evaluate/source-freshness
    config:
      bucket: "${BUCKET_NAME}"
      prefix: "bronze/openmeteo/"
      maxAgeSeconds: 86400
  - type: record-count
    evaluator: evaluate/record-count
    config:
      bucket: "${BUCKET_NAME}"
      prefix: "bronze/openmeteo/"
      minObjects: 1
trigger:
  type: glue
  jobName: medallion-silver-openmeteo
  arguments:
    "--source": "openmeteo"
    "--tier": "silver"
    "--date": "${date}"
    "--hour": "${hour}"
sla:
  evaluationDeadline: "+20m"
  timezone: "UTC"
