pipeline:
  id: silver-cdr-day
  owner: data-platform
  description: Silver CDR daily aggregation

schedule:
  trigger:
    key: daily-status
    check: equals
    field: all_hours_complete
    value: true
  evaluation:
    window: 30m
    interval: 5m

sla:
  deadline: "02:00"
  expectedDuration: 30m

validation:
  trigger: "ALL"
  rules:
    - key: daily-status
      check: equals
      field: all_hours_complete
      value: true

job:
  type: glue
  config:
    jobName: "${environment}-cdr-agg-day"
    arguments:
      "--s3_bucket": "${s3_bucket}"
  maxRetries: 2

postRun:
  evaluation:
    interval: 30m
    window: 2h
  rules:
    - key: daily-status
      check: equals
      field: all_hours_complete
      value: true
