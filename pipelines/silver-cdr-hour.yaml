pipeline:
  id: silver-cdr-hour
  owner: data-platform
  description: Silver CDR hourly aggregation — triggered by bronze completion

schedule:
  trigger:
    key: audit-result
    check: equals
    field: match
    value: true
  evaluation:
    window: 15m
    interval: 2m

sla:
  deadline: ":30"
  expectedDuration: 10m

validation:
  trigger: "ALL"
  rules:
    - key: audit-result
      check: equals
      field: match
      value: true

job:
  type: glue
  config:
    jobName: "${environment}-cdr-agg-hour"
    arguments:
      "--s3_bucket": "${s3_bucket}"
  maxRetries: 2
  maxDriftReruns: 1
  jobPollWindowSeconds: 3600

postRun:
  sensorTimeout: 2h
  rules:
    - key: hourly-status
      check: gte
      field: count
      value: 1
