id: gharchive-gold
name: GH Archive Gold ETL
description: Aggregate silver GH Archive data into gold analytics Delta table
archetype: gold-etl
traits:
  - type: upstream-dependency
    evaluator: evaluate/upstream-dependency
    config:
      tableName: "${TABLE_NAME}"
      upstreamPipeline: "gharchive-silver"
  - type: record-count
    evaluator: evaluate/record-count
    config:
      bucket: "${BUCKET_NAME}"
      prefix: "silver/gharchive/"
      minObjects: 1
      dateOnly: true
trigger:
  type: glue
  jobName: medallion-gold-gharchive
  arguments:
    "--source": "gharchive"
    "--tier": "gold"
    "--date": "${date}"
    "--hour": "${hour}"
sla:
  evaluationDeadline: "+50m"
  timezone: "UTC"
