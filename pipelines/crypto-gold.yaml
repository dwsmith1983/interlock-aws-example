id: crypto-gold
name: Crypto Gold ETL
description: Aggregate silver crypto data into gold analytics tables (daily market + top movers)
archetype: gold-etl

traits:
  - type: upstream-dependency
    evaluator: builtin:upstream-job-log
    config:
      upstreamPipeline: crypto-silver
  - type: record-count
    evaluator: evaluate/record-count
    config:
      bucket: "${BUCKET_NAME}"
      prefix: "silver/crypto/"
      minObjects: 1
      dateOnly: true

trigger:
  type: glue
  jobName: medallion-gold-crypto
  arguments:
    "--source": crypto
    "--tier": gold
    "--bucket": "${BUCKET_NAME}"
    "--table_name": "${TABLE_NAME}"
    "--par_day": "${date}"
    "--par_hour": "${hour}"

watch:
  monitoring:
    enabled: true
    duration: "20m"

sla:
  evaluationDeadline: "+40m"
  completionDeadline: "+55m"
  validationTimeout: "+35m"
