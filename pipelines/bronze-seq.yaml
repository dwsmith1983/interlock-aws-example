pipeline:
  id: bronze-seq
  owner: data-platform
  description: Bronze SEQ audit — validates raw-to-bronze processing completeness

schedule:
  trigger:
    key: hourly-status
    check: equals
    field: complete
    value: true
  evaluation:
    window: 5m
    interval: 1m

sla:
  deadline: ":15"
  expectedDuration: 3m
  maxDuration: 10m

validation:
  trigger: "ALL"
  rules:
    - key: hourly-status
      check: equals
      field: complete
      value: true
    - key: hourly-status
      check: gte
      field: pct_of_expected
      value: 0.7

job:
  type: lambda
  config:
    functionName: "${environment}-bronze-audit"
    payload: '{"body": {"stream": "seq"}}'

postRun:
  sensorTimeout: 2h
  rules:
    - key: audit-result
      check: equals
      field: match
      value: true
