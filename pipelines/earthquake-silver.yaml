id: earthquake-silver
name: Earthquake Silver ETL
description: Transform raw USGS earthquake bronze data into curated silver Delta table
archetype: silver-etl

traits:
  - type: source-freshness
    evaluator: evaluate/source-freshness
    config:
      bucket: "${BUCKET_NAME}"
      prefix: "bronze/earthquake/"
      maxAgeSeconds: 86400
  - type: record-count
    evaluator: evaluate/record-count
    config:
      bucket: "${BUCKET_NAME}"
      prefix: "bronze/earthquake/"
      minObjects: 1
  - type: sensor-freshness
    evaluator: builtin:sensor-freshness
    config:
      sensorType: ingest-freshness
      maxAge: "30m"
  - type: data-quality
    evaluator: builtin:data-quality
    config:
      sensorType: ingest-quality
      maxNullRate: 0.1

trigger:
  type: glue
  jobName: medallion-silver-earthquake
  arguments:
    "--source": earthquake
    "--tier": silver
    "--bucket": "${BUCKET_NAME}"
    "--table_name": "${TABLE_NAME}"
    "--par_day": "${date}"
    "--par_hour": "${hour}"

sla:
  evaluationDeadline: "+20m"
  completionDeadline: "+35m"
  validationTimeout: "+15m"
