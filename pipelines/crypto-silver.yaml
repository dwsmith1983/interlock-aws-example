id: crypto-silver
name: Crypto Silver ETL
description: Transform raw CoinLore ticker bronze data into curated silver Delta table
archetype: silver-etl

traits:
  - type: source-freshness
    evaluator: evaluate/source-freshness
    config:
      bucket: "${BUCKET_NAME}"
      prefix: "bronze/crypto/"
      maxAgeSeconds: 86400
  - type: record-count
    evaluator: evaluate/record-count
    config:
      bucket: "${BUCKET_NAME}"
      prefix: "bronze/crypto/"
      minObjects: 1
  - type: hour-complete
    evaluator: evaluate/hour-complete
    config:
      expectedCount: 300
  - type: sensor-freshness
    evaluator: builtin:sensor-freshness
    config:
      sensorType: ingest-freshness
      maxAge: "30m"
  - type: data-quality
    evaluator: builtin:data-quality
    config:
      sensorType: ingest-quality
      maxNullRate: 0.1

trigger:
  type: glue
  jobName: medallion-silver-crypto
  arguments:
    "--source": crypto
    "--tier": silver
    "--bucket": "${BUCKET_NAME}"
    "--table_name": "${TABLE_NAME}"
    "--par_day": "${date}"
    "--par_hour": "${hour}"

quarantine:
  blocking: false

sla:
  evaluationDeadline: "+15m"
  completionDeadline: "+20m"
  validationTimeout: "+15m"
  atRiskLeadTime: "5m"
