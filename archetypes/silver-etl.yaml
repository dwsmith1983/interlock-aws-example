name: silver-etl
description: Silver-tier ETL pipeline archetype — transforms raw bronze data to curated Delta tables
requiredTraits:
  - type: source-freshness
    defaultConfig:
      bucket: "${BUCKET_NAME}"
      prefix: "bronze/${SOURCE}/"
      maxAgeSeconds: 900
    defaultTimeout: 30
    defaultTtl: 300
  - type: record-count
    defaultConfig:
      bucket: "${BUCKET_NAME}"
      prefix: "bronze/${SOURCE}/"
      minObjects: 1
    defaultTimeout: 30
    defaultTtl: 300
optionalTraits:
  - type: sensor-freshness
    defaultConfig:
      sensorType: ingest-freshness
      maxAge: "30m"
    defaultTimeout: 10
    defaultTtl: 300
  - type: data-quality
    defaultConfig:
      sensorType: ingest-quality
      maxNullRate: 0.1
    defaultTimeout: 10
    defaultTtl: 300
readinessRule:
  type: all-required-pass
