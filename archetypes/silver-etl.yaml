name: silver-etl
description: Silver-tier ETL pipeline archetype — transforms raw bronze data to curated Delta tables
requiredTraits:
  - type: source-freshness
    defaultConfig:
      bucket: "${BUCKET_NAME}"
      prefix: "bronze/${SOURCE}/"
      maxAgeSeconds: 900
    defaultTimeout: 30
    defaultTtl: 300
  - type: record-count
    defaultConfig:
      bucket: "${BUCKET_NAME}"
      prefix: "bronze/${SOURCE}/"
      minObjects: 1
    defaultTimeout: 30
    defaultTtl: 300
readinessRule:
  type: all-required-pass
