name: gold-etl
description: Gold-tier ETL pipeline archetype — aggregates silver data into analytics-ready Delta tables
requiredTraits:
  - type: upstream-dependency
    defaultConfig:
      tableName: "${TABLE_NAME}"
    defaultTimeout: 30
    defaultTtl: 300
  - type: record-count
    defaultConfig:
      bucket: "${BUCKET_NAME}"
      prefix: "silver/${SOURCE}/"
      minObjects: 1
    defaultTimeout: 30
    defaultTtl: 300
readinessRule:
  type: all-required-pass
